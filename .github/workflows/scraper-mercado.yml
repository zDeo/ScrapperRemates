name: Scraper Mercado Semanal (Chileautos)

on:
  schedule:
    # Todos los días a las 13:30 UTC (30 min después del scraper diario)
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  scrape-mercado:
    name: Actualizar precios de mercado (Chileautos)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        working-directory: scrapers
        run: npm ci

      - name: Instalar Chromium para Playwright
        working-directory: scrapers
        run: npx playwright install chromium --with-deps

      - name: Correr scraper de precios de mercado
        working-directory: scrapers
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run scrape:mercado
