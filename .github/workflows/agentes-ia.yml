name: Agentes IA — Análisis Vehículos

on:
  schedule:
    # Todos los días a las 14:00 UTC (después de scraper-mercado)
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  agentes-ia:
    name: Analizar vehículos con Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        working-directory: scrapers
        run: npm ci

      - name: Correr agentes IA
        working-directory: scrapers
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
        run: npm run agentes
