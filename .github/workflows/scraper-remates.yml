name: Scraper Remates Diario

on:
  schedule:
    # 8:00 AM hora Chile (UTC-4 verano / UTC-3 invierno)
    # Usamos 12:00 UTC para cubrir ambos horarios
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Activar logs extra'
        required: false
        default: 'false'

jobs:
  scrape:
    name: Scrapear los 4 sitios + alertas
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: scrapers
        run: npm ci

      - name: Instalar Chromium para Playwright
        working-directory: scrapers
        run: npx playwright install chromium --with-deps

      - name: Correr scrapers
        working-directory: scrapers
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:         ${{ secrets.RESEND_FROM_EMAIL }}
          ALERT_EMAIL:               ${{ secrets.ALERT_EMAIL }}
        run: npm run scrape:remates

      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ALERT_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: ${{ secrets.ALERT_EMAIL }}
          subject: '⚠️ Scraper Remates falló'
          body: 'El workflow de scraping falló. Revisar GitHub Actions.'
          to: ${{ secrets.ALERT_EMAIL }}
        continue-on-error: true
